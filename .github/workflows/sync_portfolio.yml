name: Auto-Update Portfolio Projects

on:
  push:
    branches:
      - automation-system   # Runs whenever you push code to this branch
  schedule:
    - cron: '0 0 * * *'     # Runs automatically at midnight every day
  workflow_dispatch:        # Allows you to click a button and run it manually

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write       # Grants permission to update projects.json in your repo

    steps:
      - name: Checkout repository files
        uses: actions/checkout@v4

      - name: Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute project indexing script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_projects.py

      - name: Commit and Push Updated projects.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git status --porcelain | grep -q "projects.json"; then
            git add projects.json
            git commit -m "chore: automated update of projects.json [skip ci]"
            git push origin automation-system
          else
            echo "No changes detected. Skipping commit."
          fi